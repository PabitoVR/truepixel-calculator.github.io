<!DOCTYPE html>
<html lang="pl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TruePixel Calculator - Oblicz rzeczywiste obciążenie karty graficznej względem 1080p.">
    <meta name="theme-color" content="#0f172a">
    <title>TruePixel Calculator</title>
    
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTIiIGZpbGw9IiMwZjE3MmEiLz48cmVjdCB4PSIyMCIgeT0iMjAiIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0iI2VjNDg5OSIvPjxwYXRoIGQ9Ik0zMiA0djEyTTMyIDQ4djEyTTQgMzJoMTJNNDggMzJoMTIiIHN0cm9rZT0iI2VjNDg5OSIgc3Ryb2tlLXdpZHRoPSI2Ii8+PC9zdmc+">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            400: '#f472b6', 500: '#ec4899', 600: '#db2777',
                            700: '#be185d', 800: '#9d174d', 900: '#831843'
                        },
                        ai: { 400: '#a78bfa', 500: '#8b5cf6', 600: '#7c3aed' }
                    }
                }
            }
        }
    </script>

    <script defer src="https://cdn.jsdelivr.net/npm/marked@4.3.0/lib/marked.umd.min.js"></script>

    <style type="text/tailwindcss">
        @layer components {
            .nav-tab.active { @apply text-primary-500 border-b-2 border-primary-500; }
            .dark .nav-tab.active { @apply text-primary-400 border-primary-400; }
            .nav-tab.inactive { @apply text-slate-500 border-b-2 border-transparent hover:text-slate-700 dark:hover:text-slate-200; }
            .glass-panel { @apply bg-white/60 backdrop-blur-xl border border-white/40 shadow-xl; }
            .dark .glass-panel { @apply bg-slate-900/60 backdrop-blur-xl border border-slate-700/50; }
        }
        #progressBar { @apply bg-gradient-to-r from-primary-500 to-primary-700; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-200 transition-colors duration-300 min-h-screen">

    <nav class="w-full p-4 lg:p-6 flex flex-col md:flex-row justify-between items-center border-b border-slate-300 dark:border-slate-800 bg-white/90 dark:bg-slate-900/90 fixed top-0 z-50 backdrop-blur-md gap-4 md:gap-0">
        <div class="flex items-center gap-3">
            <svg class="w-7 h-7 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
            <span class="text-xl font-bold tracking-tight dark:text-white text-slate-900 uppercase">True<span class="text-primary-600">Pixel</span></span>
        </div>

        <div class="flex items-center gap-8">
            <button onclick="switchView('calculator')" id="tab-calculator" class="nav-tab active flex items-center gap-2 text-sm font-bold uppercase py-3 transition-all">
                <span data-i18n="tabCalc">Calculator</span>
            </button>
            <button onclick="switchView('manifest')" id="tab-manifest" class="nav-tab inactive flex items-center gap-2 text-sm font-bold uppercase py-3 transition-all">
                <span data-i18n="tabWhy">About</span>
            </button>
        </div>
        
        <div class="flex items-center gap-4">
            <button onclick="toggleLanguage()" id="langToggle" class="px-4 py-2 rounded-full border border-slate-400 dark:border-slate-700 font-bold text-xs hover:bg-slate-100 dark:hover:bg-slate-800 transition">PL</button>
            <button onclick="toggleTheme()" id="themeBtn" class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center">🌙</button>
        </div>
    </nav>

    <main class="pt-32 pb-20">
        <div id="view-calculator" class="container mx-auto px-4 max-w-6xl">
            <div class="flex flex-col lg:flex-row gap-12 items-start justify-center">
                <div class="w-full lg:w-1/2 glass-panel rounded-2xl p-8">
                    <h1 class="text-3xl font-extrabold mb-2" data-i18n="title text-slate-900 dark:text-white">Calculate Performance</h1>
                    <p class="text-slate-600 dark:text-slate-400 mb-8" data-i18n="subtitle">See the real pixel load on your GPU.</p>

                    <div class="grid grid-cols-2 gap-6 mb-8 text-slate-900 dark:text-white">
                        <div>
                            <label class="block text-[10px] font-bold uppercase mb-2 opacity-60">Width (PX)</label>
                            <input type="number" id="widthInput" value="2560" class="w-full bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg p-3 font-mono font-bold focus:ring-2 focus:ring-primary-500 outline-none">
                        </div>
                        <div>
                            <label class="block text-[10px] font-bold uppercase mb-2 opacity-60">Height (PX)</label>
                            <input type="number" id="heightInput" value="1440" class="w-full bg-slate-100 dark:bg-slate-800 border border-slate-300 dark:border-slate-700 rounded-lg p-3 font-mono font-bold focus:ring-2 focus:ring-primary-500 outline-none">
                        </div>
                    </div>

                    <div class="mb-8">
                        <p class="text-[10px] font-bold uppercase mb-3 opacity-60" data-i18n="presetsLabel">Quick Presets</p>
                        <div id="presetContainer" class="flex flex-wrap gap-2"></div>
                    </div>

                    <button onclick="calculateMP()" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-black py-4 rounded-xl transition-all shadow-lg shadow-primary-900/20" data-i18n="calcButton">CALCULATE</button>
                </div>

                <div class="w-full lg:w-1/2 flex flex-col gap-6">
                    <div id="resultPanel" class="glass-panel rounded-2xl p-8 border-l-4 border-primary-500 hidden opacity-0 transition-opacity duration-500">
                        <h2 class="text-[10px] font-black tracking-widest uppercase mb-1 opacity-60" data-i18n="loadLabel">GPU PIXEL LOAD</h2>
                        <div class="flex items-baseline gap-2">
                            <span id="mpValue" class="text-6xl font-black tracking-tighter"></span>
                            <span class="text-2xl font-bold text-primary-500">MP</span>
                        </div>
                        <p id="className" class="text-lg font-bold mt-1 opacity-80 uppercase tracking-tight"></p>
                        
                        <div class="mt-8">
                            <div class="flex justify-between text-xs font-bold mb-2 uppercase opacity-80">
                                <span data-i18n="vsFhdLabel">Vs 1080p Standard</span>
                                <span id="percentageDiff" class="text-primary-500"></span>
                            </div>
                            <div class="w-full h-4 bg-slate-200 dark:bg-slate-800 rounded-full overflow-hidden">
                                <div id="progressBar" class="h-full w-full transition-transform duration-1000 origin-left" style="transform: scaleX(0)"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-manifest" class="container mx-auto px-4 max-w-3xl hidden">
            <div class="glass-panel rounded-2xl p-8 lg:p-12">
                <h1 class="text-4xl font-black mb-6" data-i18n="manifestTitle">O Autorze</h1>
                <div id="manifestContent" class="prose dark:prose-invert max-w-none font-medium leading-relaxed"></div>
            </div>
        </div>
    </main>

    <script>
        const apiKey = "AIzaSyBTQC1-kt1zTCeMNkRCeVgMZiO_FhocKDU";
        const translations = {
            en: {
                tabCalc: "Calc", tabWhy: "About", title: "Calculate Performance", subtitle: "Real GPU pixel load metrics.",
                presetsLabel: "Presets", calcButton: "CALCULATE MP", loadLabel: "GPU LOAD", vsFhdLabel: "Vs 1080p:",
                manifestTitle: "About Author", manifests: "Created by Jakub Pabisz to show how resolution kills performance."
            },
            pl: {
                tabCalc: "Kalkulator", tabWhy: "O Autorze", title: "Oblicz Wydajność", subtitle: "Rzeczywiste obciążenie Twojej karty.",
                presetsLabel: "Szybkie wybory", calcButton: "PRZELICZ", loadLabel: "OBCIĄŻENIE GPU", vsFhdLabel: "Względem 1080p:",
                manifestTitle: "O Autorze", manifests: "Stworzone przez Jakuba Pabisza, by pokazać jak rozdzielczość zabija klatki."
            }
        };

        let currentLang = 'pl';
        let currentTheme = 'dark';

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.classList.toggle('dark', currentTheme === 'dark');
            document.getElementById('themeBtn').innerText = currentTheme === 'dark' ? '🌙' : '☀️';
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'pl' : 'en';
            updateUI();
        }

        function updateUI() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });
            document.getElementById('langToggle').innerText = currentLang.toUpperCase();
            document.getElementById('manifestContent').innerText = t.manifests;
        }

        function initPresets() {
            const container = document.getElementById('presetContainer');
            const p = [{l:"FHD", w:1920, h:1080}, {l:"QHD", w:2560, h:1440}, {l:"4K", w:3840, h:2160}];
            p.forEach(item => {
                const b = document.createElement('button');
                b.className = "px-4 py-2 bg-slate-200 dark:bg-slate-800 rounded font-bold text-xs hover:bg-primary-500 hover:text-white transition";
                b.innerText = item.l;
                b.onclick = () => { document.getElementById('widthInput').value = item.w; document.getElementById('heightInput').value = item.h; calculateMP(); };
                container.appendChild(b);
            });
        }

        function calculateMP() {
            const w = document.getElementById('widthInput').value;
            const h = document.getElementById('heightInput').value;
            const mp = ((w * h) / 1000000).toFixed(2);
            const diff = (((w * h) - (1920 * 1080)) / (1920 * 1080) * 100).toFixed(0);
            
            document.getElementById('mpValue').innerText = mp;
            document.getElementById('percentageDiff').innerText = (diff > 0 ? "+" + diff : diff) + "%";
            
            const res = document.getElementById('resultPanel');
            res.classList.remove('hidden');
            setTimeout(() => {
                res.classList.remove('opacity-0');
                document.getElementById('progressBar').style.transform = `scaleX(${Math.min((w*h)/8300000, 1)})`;
            }, 50);
        }

        function switchView(v) {
            document.getElementById('view-calculator').classList.toggle('hidden', v !== 'calculator');
            document.getElementById('view-manifest').classList.toggle('hidden', v !== 'manifest');
            document.getElementById('tab-calculator').classList.toggle('active', v === 'calculator');
            document.getElementById('tab-manifest').classList.toggle('active', v === 'manifest');
        }

        initPresets();
        updateUI();
    </script>
</body>
</html>
