<html lang="pl" class="dark">
<head>
    <meta charset="UTF-8">

    <meta name="description" content="TruePixel Calculator - Oblicz rzeczywiste obciążenie karty graficznej względem 1080p.">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#ec4899',
                            600: '#db2777',
                            700: '#be185d',
                            800: '#9d174d',
                        }
                    }
                }
            }
        }
    </script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/marked@4.3.0/lib/marked.umd.min.js"></script>

    <style type="text/tailwindcss">
        @layer components {
            .nav-tab.active { @apply text-primary-500 border-b-2 border-primary-500; }
            .nav-tab.inactive { @apply text-slate-500 border-b-2 border-transparent hover:text-slate-400; }
            
            /* LEPSZY KONTRAST DLA PANELU */
            .glass-panel { @apply bg-white/90 border border-slate-200 shadow-xl; }
            .dark .glass-panel { 
                @apply bg-slate-900/80 backdrop-blur-md border border-slate-700/50 shadow-[0_0_25px_rgba(0,0,0,0.4)]; 
            }
        }

        /* NAPRAWA PASKA - WYMUSZONY RÓŻOWY */
        #progressBar { 
            background: linear-gradient(90deg, #f472b6, #ec4899, #be185d) !important;
            box-shadow: 0 0 10px rgba(236, 72, 153, 0.3);
        }
        
        #activePill { @apply bg-primary-500 !important; }

        /* Mocniejszy kontrast dla inputów */
        input { @apply dark:bg-slate-800 dark:border-slate-600 dark:text-white !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-200 transition-colors duration-300">

    <nav class="w-full p-4 lg:p-6 flex flex-col md:flex-row justify-between items-center border-b border-slate-300 dark:border-slate-800 bg-white/90 dark:bg-slate-900/90 fixed top-0 z-50 backdrop-blur-md gap-4 md:gap-0">
        <div class="flex items-center gap-3">
            <svg class="w-7 h-7 text-primary-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
            <span class="text-xl font-bold tracking-tight dark:text-white text-slate-900">TRUE<span class="text-primary-600 font-black">PIXEL</span></span>
        </div>

        <div class="flex items-center gap-8">
            <button onclick="switchView('calculator')" id="tab-calculator" class="nav-tab active flex items-center gap-2 text-sm font-bold uppercase py-3 transition-all">
                <span data-i18n="tabCalc">Calculator</span>
            </button>
            <button onclick="switchView('manifest')" id="tab-manifest" class="nav-tab inactive flex items-center gap-2 text-sm font-bold uppercase py-3 transition-all">
                <span data-i18n="tabWhy">About Author</span>
            </button>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="langToggle" onclick="toggleLanguage()" class="px-4 py-2 rounded-full border border-slate-400 dark:border-slate-700 font-bold text-xs hover:bg-slate-100 dark:hover:bg-slate-800 transition">PL</button>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center shadow-inner" id="themeBtn">🌙</button>
        </div>
    </nav>

    <main class="relative min-h-screen pt-48 md:pt-32">
        <div id="view-calculator" class="transition-opacity duration-300">
            <div class="container mx-auto px-4 pb-32 flex flex-col lg:flex-row gap-8 lg:gap-12 items-start justify-center relative z-10">
                
                <div class="w-full lg:w-1/2 max-w-xl mx-auto lg:mx-0">
                    <div class="glass-panel rounded-2xl p-6 lg:p-8">
                        <h1 class="text-3xl font-extrabold mb-2 dark:text-white text-slate-900" data-i18n="title">Calculate Performance</h1>
                        <p class="text-slate-600 dark:text-slate-400 mb-8 font-medium" data-i18n="subtitle">Forget "4K". See how much your GPU actually calculates.</p>

                        <div class="grid grid-cols-2 gap-6 mb-8">
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest" data-i18n="widthLabel">WIDTH (PX)</label>
                                <input type="number" id="widthInput" value="2560" class="w-full border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-3 font-mono text-lg font-bold outline-none focus:border-primary-500 transition-all">
                            </div>
                            <div>
                                <label class="block text-xs font-bold text-slate-500 mb-2 uppercase tracking-widest" data-i18n="heightLabel">HEIGHT (PX)</label>
                                <input type="number" id="heightInput" value="1440" class="w-full border border-slate-300 dark:border-slate-600 rounded-lg px-4 py-3 font-mono text-lg font-bold outline-none focus:border-primary-500 transition-all">
                            </div>
                        </div>

                        <div class="mb-8 relative">
                            <p class="text-xs font-bold text-slate-500 uppercase tracking-widest mb-3" data-i18n="presetsLabel">QUICK PRESETS</p>
                            <div class="relative flex flex-wrap gap-2" id="presetContainer">
                                <div id="activePill" class="absolute top-0 left-0 rounded shadow-lg opacity-0 pointer-events-none transition-all duration-300"></div>
                            </div>
                        </div>

                        <button onclick="calculateMP()" class="w-full bg-primary-700 hover:bg-primary-800 text-white font-bold py-4 rounded-xl shadow-lg transition-all active:scale-[0.98]" data-i18n="calcButton">PRZELICZ NA MP</button>
                    </div>
                </div>

                <div class="w-full lg:w-1/2 max-w-xl mx-auto lg:mx-0 flex flex-col gap-6">
                    <div id="placeholderState" class="flex flex-col items-center justify-center h-64 text-slate-500 border-2 border-dashed border-slate-300 dark:border-slate-800 rounded-2xl font-bold">
                        <p data-i18n="placeholderText">Wprowadź dane i naciśnij Przelicz</p>
                    </div>

                    <div id="resultPanel" class="hidden opacity-0 transition-all duration-500 flex flex-col gap-6">
                        <div class="glass-panel rounded-2xl p-6 lg:p-8 relative overflow-hidden">
                            <h2 class="text-xs font-bold tracking-widest uppercase mb-1 opacity-60" data-i18n="loadLabel">GPU LOAD</h2>
                            <div class="flex items-baseline gap-2 mb-4">
                                <span id="mpValue" class="text-6xl font-black text-slate-900 dark:text-white"></span>
                                <span class="text-2xl font-bold text-primary-500">MP</span>
                            </div>
                            
                            <div class="pt-6 border-t border-slate-200 dark:border-slate-800">
                                <div class="flex justify-between text-sm font-bold mb-2">
                                    <span data-i18n="vsFhdLabel">Vs FHD (1080p):</span>
                                    <span id="percentageDiff" class="text-primary-500 font-black"></span>
                                </div>
                                <div class="w-full h-4 bg-slate-200 dark:bg-slate-900 rounded-full overflow-hidden shadow-inner">
                                    <div id="progressBar" class="h-full w-full transition-transform duration-1000 origin-left" style="transform: scaleX(0)"></div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        // Logika z pliku index (2).html (API, Presety, Obliczenia)
        const apiKey = "AIzaSyBTQC1-kt1zTCeMNkRCeVgMZiO_FhocKDU";
        let currentLang = 'pl';

        const presets = [
            { label: "FHD", w: 1920, h: 1080 },
            { label: "QHD", w: 2560, h: 1440 },
            { label: "UW 34\"", w: 3440, h: 1440 },
            { label: "4K UHD", w: 3840, h: 2160 }
        ];

        function init() {
            const container = document.getElementById('presetContainer');
            presets.forEach(p => {
                const btn = document.createElement('button');
                btn.className = "preset-btn relative z-10 px-4 py-2 rounded text-sm font-bold transition-all hover:text-white";
                btn.innerText = p.label;
                btn.onclick = () => {
                    document.getElementById('widthInput').value = p.w;
                    document.getElementById('heightInput').value = p.h;
                    calculateMP();
                };
                container.appendChild(btn);
            });
            calculateMP();
        }

        function calculateMP() {
            const w = document.getElementById('widthInput').value;
            const h = document.getElementById('heightInput').value;
            const mp = ((w * h) / 1000000).toFixed(2);
            const diff = (((w * h) - (1920 * 1080)) / (1920 * 1080) * 100).toFixed(0);
            
            document.getElementById('mpValue').innerText = mp;
            document.getElementById('percentageDiff').innerText = (diff > 0 ? "+" + diff : diff) + "%";
            
            document.getElementById('placeholderState').classList.add('hidden');
            const res = document.getElementById('resultPanel');
            res.classList.remove('hidden');
            setTimeout(() => {
                res.classList.remove('opacity-0');
                document.getElementById('progressBar').style.transform = `scaleX(${Math.min((w*h)/8300000, 1)})`;
            }, 50);
            updatePill();
        }

        function updatePill() {
            const w = document.getElementById('widthInput').value;
            const h = document.getElementById('heightInput').value;
            const pill = document.getElementById('activePill');
            const btns = document.querySelectorAll('.preset-btn');
            let found = false;

            btns.forEach(btn => {
                const p = presets.find(x => x.label === btn.innerText);
                if(p && p.w == w && p.h == h) {
                    pill.style.width = btn.offsetWidth + 'px';
                    pill.style.height = btn.offsetHeight + 'px';
                    pill.style.transform = `translate(${btn.offsetLeft}px, ${btn.offsetTop}px)`;
                    pill.style.opacity = '1';
                    btn.classList.add('text-white');
                    found = true;
                } else { btn.classList.remove('text-white'); }
            });
            if(!found) pill.style.opacity = '0';
        }

        function toggleTheme() {
            document.documentElement.classList.toggle('dark');
        }

        init();
    </script>
</body>
</html>
