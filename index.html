<!DOCTYPE html>
<html lang="pl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TruePixel Calculator - Oblicz rzeczywiste obciążenie karty graficznej względem 1080p.">
    <meta name="theme-color" content="#0f172a">
    
    <title>TruePixel Calculator</title>
    
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTIiIGZpbGw9IiMwZjE3MmEiLz48cmVjdCB4PSIyMCIgeT0iMjAiIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0iI2VjNDg5OSIvPjxwYXRoIGQ9Ik0zMiA0djEyTTMyIDQ4djEyTTQgMzJoMTJNNDggMzJoMTIiIHN0cm9rZT0iI2VjNDg5OSIgc3Ryb2tlLXdpZHRoPSI2Ii8+PC9zdmc+">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap">

    <link rel="stylesheet" href="style.css?v=1.3">
    
    <script defer src="https://cdn.jsdelivr.net/npm/marked@4.3.0/lib/marked.umd.min.js"></script>

    <style>
        /* DEFINICJA KOLORÓW RÓŻOWYCH */
        .text-primary-700, .text-primary-500 { color: #ec4899 !important; }
        .bg-primary-700, .bg-primary-600 { background-color: #ec4899 !important; }
        .bg-primary-800, .hover\:bg-primary-800:hover { background-color: #db2777 !important; }
        .border-primary-700 { border-color: #ec4899 !important; }
        
        /* Aktywne zakładki */
        .nav-tab.active { color: #ec4899 !important; border-bottom: 2px solid #ec4899 !important; }
        .dark .nav-tab.active { color: #f472b6 !important; border-bottom-color: #f472b6 !important; }
        
        /* Pigułka wyboru (Preset) */
        #activePill { background-color: #ec4899 !important; }

        .nav-tab.inactive { color: #64748b; border-bottom: 2px solid transparent; }
        .nav-tab.inactive:hover { color: #334155; }
        .dark .nav-tab.inactive { color: #94a3b8; }
        .dark .nav-tab.inactive:hover { color: #e2e8f0; }

        .glass-panel { background: rgba(255, 255, 255, 0.65); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(255, 255, 255, 0.4); }
        .dark .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px); border: 1px solid rgba(51, 65, 85, 0.5); }
        
        /* Progress bar */
        #progressBar { background: linear-gradient(to right, #ec4899, #db2777) !important; }
    </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-200 transition-colors duration-300">

    <nav class="w-full p-4 lg:p-6 flex flex-col md:flex-row justify-between items-center border-b border-slate-300 dark:border-slate-800 bg-white/90 dark:bg-slate-900/90 fixed top-0 z-50 backdrop-blur-md transition-colors duration-300 gap-4 md:gap-0">
        <div class="flex items-center gap-3">
            <svg class="w-7 h-7 text-primary-700 dark:text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
            <span class="text-xl font-bold tracking-tight dark:text-white text-slate-900">TRUE<span class="text-primary-700 dark:text-primary-500">PIXEL</span></span>
        </div>

        <div class="flex items-center gap-8">
            <button onclick="switchView('calculator')" id="tab-calculator" aria-label="Calculator View" class="nav-tab active flex items-center gap-2 text-sm font-bold uppercase tracking-wider py-3 min-h-[48px] transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 7h6m0 10v-3m-3 3h.01M9 17h.01M9 14h.01M12 14h.01M15 11h.01M12 11h.01M9 11h.01M7 21h10a2 2 0 002-2V5a2 2 0 00-2-2H7a2 2 0 00-2 2v14a2 2 0 002 2z"></path></svg>
                <span data-i18n="tabCalc">Calculator</span>
            </button>
            <button onclick="switchView('manifest')" id="tab-manifest" aria-label="About the Author View" class="nav-tab inactive flex items-center gap-2 text-sm font-bold uppercase tracking-wider py-3 min-h-[48px] transition-all">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
                <span data-i18n="tabWhy">About the Author</span>
            </button>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="langToggle" onclick="toggleLanguage()" aria-label="Toggle language" class="flex items-center gap-2 text-sm font-bold px-4 py-2 min-h-[48px] rounded-full border border-slate-400 dark:border-slate-700 hover:bg-slate-200 dark:hover:bg-slate-800 transition text-slate-900 dark:text-slate-200"></button>
            <button onclick="toggleTheme()" aria-label="Toggle dark mode" class="w-12 h-12 rounded-full flex items-center justify-center bg-slate-200 dark:bg-slate-800 text-slate-900 dark:text-yellow-400 hover:bg-slate-300 dark:hover:bg-slate-700 transition" id="themeBtn"></button>
        </div>
    </nav>

    <main class="relative min-[100dvh] pt-48 md:pt-32">
        <div id="view-calculator" class="transition-opacity duration-300">
            <div class="container mx-auto px-4 pb-32 flex flex-col lg:flex-row gap-8 lg:gap-12 items-start justify-center relative z-10">
                <div class="w-full lg:w-1/2 max-w-xl mx-auto lg:mx-0">
                    <div class="glass-panel rounded-2xl p-6 lg:p-8 shadow-2xl">
                        <h1 class="text-3xl font-extrabold mb-2 dark:text-white text-slate-900" data-i18n="title">Calculate Performance</h1>
                        <p class="text-slate-700 dark:text-slate-300 mb-8 font-medium" data-i18n="subtitle">Forget "4K". See how much your GPU actually calculates.</p>

                        <div class="grid grid-cols-2 gap-6 mb-8">
                            <div>
                                <label for="widthInput" class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-2 font-mono uppercase" data-i18n="widthLabel">WIDTH (PX)</label>
                                <input type="number" id="widthInput" value="2560" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-400 dark:border-slate-600 rounded-lg px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:border-primary-700 focus:ring-1 focus:ring-primary-700 transition font-mono text-lg font-bold min-h-[48px]">
                            </div>
                            <div>
                                <label for="heightInput" class="block text-xs font-bold text-slate-700 dark:text-slate-300 mb-2 font-mono uppercase" data-i18n="heightLabel">HEIGHT (PX)</label>
                                <input type="number" id="heightInput" value="1440" class="w-full bg-slate-50 dark:bg-slate-800 border border-slate-400 dark:border-slate-600 rounded-lg px-4 py-3 text-slate-900 dark:text-white focus:outline-none focus:border-primary-700 focus:ring-1 focus:ring-primary-700 transition font-mono text-lg font-bold min-h-[48px]">
                            </div>
                        </div>

                        <div class="mb-8 relative">
                            <p class="text-xs text-slate-700 dark:text-slate-400 uppercase tracking-wider font-bold mb-3" data-i18n="presetsLabel">QUICK PRESETS</p>
                            <div class="relative flex flex-wrap gap-2" id="presetContainer">
                                <div id="activePill" class="absolute top-0 left-0 rounded shadow-lg opacity-0 pointer-events-none origin-top-left transition-transform duration-300"></div>
                            </div>
                        </div>

                        <button onclick="calculateMP()" class="w-full bg-primary-700 hover:bg-primary-800 text-white font-bold py-4 rounded-xl shadow-lg transition transform hover:-translate-y-0.5 active:translate-y-0 mb-6 min-h-[48px]" data-i18n="calcButton">PRZELICZ NA MP</button>
                    </div>
                </div>

                <div class="w-full lg:w-1/2 max-w-xl mx-auto lg:mx-0 flex flex-col gap-6">
                    <div id="placeholderState" class="flex flex-col items-center justify-center h-[400px] text-slate-600 dark:text-slate-400 border-2 border-dashed border-slate-400 dark:border-slate-700 rounded-2xl">
                        <p class="font-bold" data-i18n="placeholderText">Enter data and press Calculate</p>
                    </div>

                    <div id="resultPanel" class="hidden opacity-0 transition-opacity duration-500 flex flex-col gap-6">
                        <div class="glass-panel rounded-2xl p-6 lg:p-8 border-primary-700/30 relative overflow-hidden flex-1">
                            <h2 class="text-slate-700 dark:text-slate-400 text-xs font-bold tracking-widest uppercase mb-1" data-i18n="loadLabel">GPU LOAD</h2>
                            <div class="flex items-baseline gap-2">
                                <span id="mpValue" class="text-6xl font-extrabold text-slate-900 dark:text-white tracking-tighter"></span>
                                <span class="text-2xl font-bold text-primary-700 dark:text-primary-500">MP</span>
                            </div>
                            <p id="className" class="text-xl mt-2 font-bold text-slate-800 dark:text-slate-200"></p>
                            
                            <div class="mt-6 pt-6 border-t border-slate-300 dark:border-slate-700/50">
                                <div class="flex justify-between text-sm mb-2">
                                    <span class="text-slate-700 dark:text-slate-300 font-semibold" data-i18n="vsFhdLabel">Vs FHD (1080p):</span>
                                    <span id="percentageDiff" class="font-bold"></span>
                                </div>
                                <div class="w-full h-3 bg-slate-300 dark:bg-slate-700 rounded-full overflow-hidden">
                                    <div id="progressBar" class="h-full w-full transition-transform duration-1000 ease-out origin-left" style="transform: scaleX(0)"></div>
                                </div>
                            </div>
                        </div>

                        <div class="glass-panel rounded-2xl p-6 flex-1">
                            <h3 class="font-bold text-slate-900 dark:text-white mb-3 flex items-center gap-2">
                                <span data-i18n="verdictTitle">Verdict</span>
                            </h3>
                            <p id="verdictText" class="text-slate-800 dark:text-slate-200 font-medium text-sm"></p>
                        </div>
                    </div>
                </div>
            </div>

            <div id="aiSection" class="w-full bg-slate-100 dark:bg-slate-900 border-t border-slate-300 dark:border-slate-800 pt-24 pb-24">
                <div class="container mx-auto px-4 max-w-4xl">
                    <div class="text-center mb-10">
                        <h3 class="text-3xl font-extrabold text-slate-900 dark:text-white mb-3" data-i18n="aiTitle">AI Hardware Advisor</h3>
                        <p class="text-slate-700 dark:text-slate-300" data-i18n="aiSubtitle">Get recommendations.</p>
                    </div>

                    <div class="glass-panel rounded-2xl p-8 max-w-2xl mx-auto">
                        <button onclick="askGemini()" id="aiButton" class="w-full bg-slate-900 dark:bg-slate-800 text-white font-bold py-4 rounded-xl transition-all min-h-[48px]" data-i18n="aiButtonText">Ask AI</button>
                        <div id="aiResult" class="hidden mt-6 pt-6 border-t border-slate-300 dark:border-slate-700/50">
                            <div id="aiLoading" class="hidden py-6 text-center animate-pulse" data-i18n="aiLoadingText">Analyzing...</div>
                            <div id="aiContent" class="text-sm lg:text-base text-slate-800 dark:text-slate-200 leading-relaxed"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-manifest" class="hidden pb-24">
            <div class="container mx-auto px-4 max-w-3xl">
                <div class="glass-panel rounded-3xl p-8 lg:p-12 shadow-2xl">
                    <h1 class="text-4xl font-extrabold mb-8 dark:text-white text-slate-900" data-i18n="manifestTitle">O Autorze</h1>
                    <div class="prose dark:prose-invert max-w-none text-slate-800 dark:text-slate-200">
                        <div data-i18n-html="manifestContent"></div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer class="text-center py-8 text-slate-600 dark:text-slate-400 text-sm border-t border-slate-300 dark:border-slate-800">
        <p>&copy; 2026 TruePixel. Created by Jakub Pabisz.</p>
    </footer>

    <script>
        const apiKey = "AIzaSyBTQC1-kt1zTCeMNkRCeVgMZiO_FhocKDU";

        const translations = {
            en: {
                tabCalc: "Calculator", tabWhy: "About Me", title: "Calculate Performance", subtitle: "Forget \"upscaling\". See how much your GPU actually calculates.",
                widthLabel: "WIDTH (PX)", heightLabel: "HEIGHT (PX)", presetsLabel: "QUICK PRESETS", calcButton: "CALCULATE MP", loadLabel: "GPU LOAD",
                vsFhdLabel: "Vs FHD (1080p):", verdictTitle: "Verdict", placeholderText: "Enter data and press Calculate",
                aiTitle: "AI Hardware Advisor", aiSubtitle: "Get recommendations.", aiButtonText: "Ask AI", aiLoadingText: "Analyzing pixel density...",
                manifestTitle: "About the Author", coffeeComingSoon: "Donations coming soon",
                verdicts: { legacy: "Entry Level...", fhd: "1080p Standard...", qhd: "1440p Sweet spot...", uw: "High Performance...", uhd: "4K Heavyweight...", extreme: "Extreme load..." },
                classes: { legacy: "Class <2M", fhd: "Class 2M", qhd: "Class 4M", uw: "Class 5M+", uhd: "Class 8M+", extreme: "Class 33M+" }
            },
            pl: {
                tabCalc: "Kalkulator", tabWhy: "O Autorze", title: "Oblicz Wydajność", subtitle: "Sprawdź, ile pikseli naprawdę musi przeliczyć Twoja karta.",
                widthLabel: "SZEROKOŚĆ (PX)", heightLabel: "WYSOKOŚĆ (PX)", presetsLabel: "SZYBKIE WYBORY", calcButton: "PRZELICZ NA MP", loadLabel: "OBCIĄŻENIE GPU",
                vsFhdLabel: "Względem FHD (1080p):", verdictTitle: "Werdykt", placeholderText: "Wprowadź dane i naciśnij Przelicz",
                aiTitle: "Doradca AI", aiSubtitle: "Sprawdź rekomendacje sprzętowe.", aiButtonText: "Zapytaj AI", aiLoadingText: "Analizowanie wymagań VRAM...",
                manifestTitle: "O Autorze", coffeeComingSoon: "Wsparcie wkrótce",
                verdicts: { legacy: "Poziom podstawowy...", fhd: "Standard 1080p...", qhd: "Złoty środek 1440p...", uw: "Wysoka wydajność...", uhd: "Waga ciężka 4K...", extreme: "God Mode..." },
                classes: { legacy: "Klasa <2M", fhd: "Klasa 2M", qhd: "Klasa 4M", uw: "Klasa 5M+", uhd: "Klasa 8M+", extreme: "Klasa 33M+" }
            }
        };

        const manifestPL = `<p>Cześć! Nazywam się Jakub i stworzyłem to narzędzie, aby uświadomić użytkownikom, jak drastycznie rośnie obciążenie GPU wraz z rozdzielczością.</p>`;
        const manifestEN = `<p>Hi! I'm Jakub, and I created this tool to help people realize how GPU load scales with resolution.</p>`;

        let currentLang = 'pl';
        let currentTheme = 'dark';
        
        const presets = [
            { label: "FHD", w: 1920, h: 1080 },
            { label: "QHD", w: 2560, h: 1440 },
            { label: "UW 34\"", w: 3440, h: 1440 },
            { label: "4K UHD", w: 3840, h: 2160 }
        ];

        function init() {
            initPresetButtons();
            updateLanguageUI();
            calculateMP();
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.classList.toggle('dark');
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'pl' : 'en';
            updateLanguageUI();
            calculateMP();
        }

        function updateLanguageUI() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });
            const manifestContainer = document.querySelector('[data-i18n-html="manifestContent"]');
            if (manifestContainer) manifestContainer.innerHTML = currentLang === 'pl' ? manifestPL : manifestEN;
            document.getElementById('langToggle').innerText = currentLang.toUpperCase();
        }

        function initPresetButtons() {
            const container = document.getElementById('presetContainer');
            presets.forEach((p, idx) => {
                const btn = document.createElement('button');
                btn.className = `preset-btn relative z-10 px-4 py-2 rounded text-sm font-bold transition-all text-slate-700 dark:text-slate-300`;
                btn.innerText = p.label;
                btn.onclick = () => {
                    document.getElementById('widthInput').value = p.w;
                    document.getElementById('heightInput').value = p.h;
                    calculateMP();
                };
                container.appendChild(btn);
            });
        }

        function updatePresetUIState() {
            const currentW = document.getElementById('widthInput').value;
            const currentH = document.getElementById('heightInput').value;
            const buttons = document.querySelectorAll('.preset-btn');
            const pill = document.getElementById('activePill');
            
            let found = false;
            buttons.forEach(btn => {
                const isMatch = btn.innerText.includes(currentW) || (presets.find(p => p.label === btn.innerText && p.w == currentW && p.h == currentH));
                if (isMatch && !found) {
                    pill.style.opacity = '1';
                    pill.style.width = btn.offsetWidth + 'px';
                    pill.style.height = btn.offsetHeight + 'px';
                    pill.style.transform = `translate(${btn.offsetLeft}px, ${btn.offsetTop}px)`;
                    btn.classList.add('text-white');
                    found = true;
                } else {
                    btn.classList.remove('text-white');
                }
            });
            if (!found) pill.style.opacity = '0';
        }

        function calculateMP() {
            const w = parseInt(document.getElementById('widthInput').value) || 0;
            const h = parseInt(document.getElementById('heightInput').value) || 0;
            const t = translations[currentLang];

            const mp = ((w * h) / 1000000).toFixed(2);
            const diff = (((w * h) - (1920 * 1080)) / (1920 * 1080) * 100).toFixed(0);
            
            document.getElementById('mpValue').innerText = mp;
            document.getElementById('percentageDiff').innerText = (diff > 0 ? "+" + diff : diff) + "%";
            
            let c = "", v = "";
            if (mp < 1.5) { c = t.classes.legacy; v = t.verdicts.legacy; }
            else if (mp < 2.5) { c = t.classes.fhd; v = t.verdicts.fhd; }
            else if (mp < 4.5) { c = t.classes.qhd; v = t.verdicts.qhd; }
            else if (mp < 7.5) { c = t.classes.uw; v = t.verdicts.uw; }
            else if (mp < 30) { c = t.classes.uhd; v = t.verdicts.uhd; }
            else { c = t.classes.extreme; v = t.verdicts.extreme; }

            document.getElementById('className').innerText = c;
            document.getElementById('verdictText').innerText = v;
            
            document.getElementById('placeholderState').classList.add('hidden');
            document.getElementById('resultPanel').classList.remove('hidden');
            setTimeout(() => {
                document.getElementById('resultPanel').classList.remove('opacity-0');
                document.getElementById('progressBar').style.transform = `scaleX(${Math.min((w*h)/8300000, 1)})`;
            }, 50);
            updatePresetUIState();
        }

        function switchView(view) {
            document.getElementById('view-calculator').classList.toggle('hidden', view !== 'calculator');
            document.getElementById('view-manifest').classList.toggle('hidden', view !== 'manifest');
            document.getElementById('tab-calculator').classList.toggle('active', view === 'calculator');
            document.getElementById('tab-manifest').classList.toggle('active', view === 'manifest');
        }

        async function askGemini() {
            const w = document.getElementById('widthInput').value;
            const h = document.getElementById('heightInput').value;
            const mp = document.getElementById('mpValue').innerText;
            const resDiv = document.getElementById('aiResult'), load = document.getElementById('aiLoading'), cont = document.getElementById('aiContent');
            
            resDiv.classList.remove('hidden'); load.classList.remove('hidden'); cont.innerHTML = '';
            
            try {
                const r = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${apiKey}`, {
                    method: 'POST', headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify({ contents: [{ parts: [{ text: `GPU recommendations for ${w}x${h} (${mp}MP). Lang: ${currentLang}. Simple bullets.` }] }] })
                });
                const d = await r.json();
                cont.innerHTML = d.candidates[0].content.parts[0].text.replace(/\n/g, '<br>');
            } catch (e) { cont.innerText = "Error loading AI."; }
            finally { load.classList.add('hidden'); }
        }

        init();
    </script>
</body>
</html>
