<!DOCTYPE html>
<html lang="pl" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="TruePixel Calculator - Oblicz rzeczywiste obciążenie karty graficznej względem 1080p.">
    <meta name="theme-color" content="#0f172a">
    
    <title>TruePixel Calculator</title>
    
    <link rel="icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCA2NCA2NCI+PHJlY3Qgd2lkdGg9IjY0IiBoZWlnaHQ9IjY0IiByeD0iMTIiIGZpbGw9IiMwZjE3MmEiLz48cmVjdCB4PSIyMCIgeT0iMjAiIHdpZHRoPSIyNCIgaGVpZ2h0PSIyNCIgZmlsbD0iI2VjNDg5OSIvPjxwYXRoIGQ9Ik0zMiA0djEyTTMyIDQ4djEyTTQgMzJoMTJNNDggMzJoMTIiIHN0cm9rZT0iI2VjNDg5OSIgc3Ryb2tlLXdpZHRoPSI2Ii8+PC9zdmc+">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&family=JetBrains+Mono:wght@400;700&display=swap">

    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: {
                            500: '#ec4899',
                            600: '#db2777',
                            700: '#be185d',
                        }
                    }
                }
            }
        }
    </script>
    
    <script defer src="https://cdn.jsdelivr.net/npm/marked@4.3.0/lib/marked.umd.min.js"></script>

    <style type="text/tailwindcss">
        @layer base {
            body { @apply bg-slate-50 text-slate-900 dark:bg-[#070a13] dark:text-slate-100 transition-colors duration-300; }
        }

        @layer components {
            .glass-panel { 
                @apply bg-white/80 backdrop-blur-md border border-slate-200 shadow-xl; 
            }
            .dark .glass-panel { 
                @apply bg-slate-900/90 backdrop-blur-xl border border-primary-500/30 shadow-[0_0_30px_rgba(0,0,0,0.5)]; 
            }
            .nav-tab.active { @apply text-primary-500 border-b-2 border-primary-500; }
            .nav-tab.inactive { @apply text-slate-500 border-b-2 border-transparent hover:text-slate-700 dark:hover:text-slate-300; }
        }

        /* FORCE PINK & CONTRAST */
        #progressBar { 
            background: linear-gradient(90deg, #f472b6, #ec4899, #be185d) !important;
            box-shadow: 0 0 15px rgba(236, 72, 153, 0.5);
        }
        
        #activePill { @apply bg-primary-500 shadow-[0_0_15px_rgba(236,72,153,0.4)]; }

        input[type="number"] { @apply bg-slate-100 dark:bg-slate-800 border-2 border-slate-300 dark:border-slate-700 focus:border-primary-500 outline-none transition-all; }
        
        .preset-btn { @apply bg-slate-200 dark:bg-slate-800 hover:bg-slate-300 dark:hover:bg-slate-700 font-bold transition-all; }
    </style>
</head>
<body>

    <nav class="w-full p-4 lg:p-6 flex flex-col md:flex-row justify-between items-center border-b border-slate-300 dark:border-slate-800 bg-white/90 dark:bg-[#0b1120]/90 fixed top-0 z-50 backdrop-blur-md gap-4">
        <div class="flex items-center gap-3">
            <svg class="w-8 h-8 text-primary-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 3v2m6-2v2M9 19v2m6-2v2M5 9H3m2 6H3m18-6h-2m2 6h-2M7 19h10a2 2 0 002-2V7a2 2 0 00-2-2H7a2 2 0 00-2 2v10a2 2 0 002 2zM9 9h6v6H9V9z"></path></svg>
            <span class="text-2xl font-black tracking-tighter uppercase">True<span class="text-primary-500">Pixel</span></span>
        </div>

        <div class="flex items-center gap-6">
            <button onclick="switchView('calculator')" id="tab-calculator" class="nav-tab active px-2 py-2 font-bold uppercase text-xs tracking-widest transition-all">Calculator</button>
            <button onclick="switchView('manifest')" id="tab-manifest" class="nav-tab inactive px-2 py-2 font-bold uppercase text-xs tracking-widest transition-all">About Author</button>
        </div>
        
        <div class="flex items-center gap-4">
            <button id="langToggle" onclick="toggleLanguage()" class="text-xs font-black border-2 border-slate-400 dark:border-slate-600 px-3 py-1 rounded-md hover:bg-primary-500 hover:border-primary-500 hover:text-white transition-all">EN</button>
            <button onclick="toggleTheme()" class="w-10 h-10 rounded-full bg-slate-200 dark:bg-slate-800 flex items-center justify-center text-xl shadow-inner" id="themeBtn">🌙</button>
        </div>
    </nav>

    <main class="pt-32 min-h-screen">
        <div id="view-calculator" class="container mx-auto px-4 max-w-6xl transition-all duration-300">
            <div class="flex flex-col lg:flex-row gap-8 lg:gap-16 items-start justify-center">
                
                <div class="w-full lg:w-1/2 glass-panel rounded-3xl p-8 lg:p-10">
                    <h1 class="text-4xl font-black mb-2 tracking-tight" data-i18n="title">Calculate Performance</h1>
                    <p class="text-slate-500 dark:text-slate-400 mb-10 font-medium" data-i18n="subtitle">Forget "4K". See how much your GPU actually calculates.</p>

                    <div class="grid grid-cols-2 gap-6 mb-10">
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest mb-2 opacity-50" data-i18n="widthLabel">Width (PX)</label>
                            <input type="number" id="widthInput" value="2560" class="w-full rounded-xl px-4 py-4 font-mono text-xl font-bold">
                        </div>
                        <div>
                            <label class="block text-[10px] font-black uppercase tracking-widest mb-2 opacity-50" data-i18n="heightLabel">Height (PX)</label>
                            <input type="number" id="heightInput" value="1440" class="w-full rounded-xl px-4 py-4 font-mono text-xl font-bold">
                        </div>
                    </div>

                    <div class="mb-10">
                        <p class="text-[10px] font-black uppercase tracking-widest mb-4 opacity-50" data-i18n="presetsLabel">Quick Presets</p>
                        <div class="relative flex flex-wrap gap-2" id="presetContainer">
                            <div id="activePill" class="absolute top-0 left-0 rounded-md transition-all duration-300 opacity-0 pointer-events-none"></div>
                        </div>
                    </div>

                    <button onclick="calculateMP()" class="w-full bg-primary-600 hover:bg-primary-700 text-white font-black py-5 rounded-2xl shadow-lg shadow-primary-500/30 transition-all active:scale-95 text-lg uppercase tracking-tighter" data-i18n="calcButton">
                        Przelicz na MP
                    </button>
                </div>

                <div class="w-full lg:w-1/2 flex flex-col gap-6">
                    <div id="placeholderState" class="h-64 border-4 border-dashed border-slate-300 dark:border-slate-800 rounded-3xl flex items-center justify-center opacity-40 font-bold">
                        <p data-i18n="placeholderText">Wprowadź dane i naciśnij Przelicz</p>
                    </div>

                    <div id="resultPanel" class="hidden opacity-0 transition-all duration-500 flex flex-col gap-6 scale-95">
                        <div class="glass-panel rounded-3xl p-8 lg:p-10 relative overflow-hidden">
                            <h2 class="text-[10px] font-black tracking-[0.2em] uppercase mb-2 opacity-60" data-i18n="loadLabel">GPU PIXEL LOAD</h2>
                            <div class="flex items-baseline gap-2 mb-2">
                                <span id="mpValue" class="text-7xl lg:text-8xl font-black tracking-tighter text-slate-900 dark:text-white"></span>
                                <span class="text-3xl font-black text-primary-500">MP</span>
                            </div>
                            <p id="className" class="text-xl font-black uppercase tracking-tight text-primary-500 mb-8"></p>
                            
                            <div class="pt-8 border-t-2 border-slate-200 dark:border-slate-800">
                                <div class="flex justify-between text-xs font-black mb-3 uppercase">
                                    <span data-i18n="vsFhdLabel">Vs FHD (1080p):</span>
                                    <span id="percentageDiff" class="text-primary-500 text-lg"></span>
                                </div>
                                <div class="w-full h-5 bg-slate-200 dark:bg-slate-900 rounded-full overflow-hidden p-1 shadow-inner">
                                    <div id="progressBar" class="h-full rounded-full transition-transform duration-1000 ease-out origin-left" style="transform: scaleX(0)"></div>
                                </div>
                            </div>
                        </div>

                        <div class="glass-panel rounded-3xl p-8">
                            <h3 class="font-black text-xs uppercase tracking-widest mb-4 opacity-50" data-i18n="verdictTitle">Verdict</h3>
                            <p id="verdictText" class="text-lg font-bold leading-snug"></p>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div id="view-manifest" class="container mx-auto px-4 max-w-3xl hidden opacity-0 transition-all duration-300">
            <div class="glass-panel rounded-3xl p-10 lg:p-16">
                <h1 class="text-5xl font-black mb-10 tracking-tighter" data-i18n="manifestTitle">O Autorze</h1>
                <div id="manifestContent" class="prose dark:prose-invert max-w-none text-xl font-medium leading-relaxed"></div>
            </div>
        </div>
    </main>

    <footer class="py-12 text-center text-[10px] font-black uppercase tracking-widest opacity-40">
        <p>&copy; 2026 TruePixel | Created by Jakub Pabisz</p>
    </footer>

    <script>
        const apiKey = "AIzaSyBTQC1-kt1zTCeMNkRCeVgMZiO_FhocKDU";
        const translations = {
            en: {
                tabCalc: "Calculator", tabWhy: "About", title: "Calculate Performance", subtitle: "Forget \"upscaling\". See how much your GPU actually calculates.",
                widthLabel: "Width (PX)", heightLabel: "Height (PX)", presetsLabel: "Quick Presets", calcButton: "Calculate MP", loadLabel: "GPU PIXEL LOAD",
                vsFhdLabel: "Vs FHD (1080p):", verdictTitle: "Verdict", placeholderText: "Enter data and press Calculate",
                manifestTitle: "About Author",
                verdicts: { legacy: "Legacy resolution. Any modern toaster can run this.", fhd: "The gold standard for years, but showing its age.", qhd: "The current sweet spot for high-end gaming.", uhd: "Heavyweight territory. You need a monster GPU here.", extreme: "Uncharted territory. Pixels are everywhere." }
            },
            pl: {
                tabCalc: "Kalkulator", tabWhy: "O Autorze", title: "Oblicz Wydajność", subtitle: "Zapomnij o upskalowaniu. Sprawdź realny wycisk dla karty.",
                widthLabel: "Szerokość (PX)", heightLabel: "Wysokość (PX)", presetsLabel: "Szybkie wybory", calcButton: "Przelicz na MP", loadLabel: "OBCIĄŻENIE GPU",
                vsFhdLabel: "Względem FHD (1080p):", verdictTitle: "Werdykt", placeholderText: "Wprowadź dane i naciśnij Przelicz",
                manifestTitle: "O Autorze",
                verdicts: { legacy: "Rozdzielczość archiwalna. Każdy kalkulator to udźwignie.", fhd: "Standard, który powoli odchodzi do lamusa.", qhd: "Złoty środek dla nowoczesnych graczy.", uhd: "Waga ciężka. Tu zaczynają się schody dla GPU.", extreme: "Absolutne ekstremum. Powodzenia dla VRAMu." }
            }
        };

        let currentLang = 'pl';
        let currentTheme = 'dark';

        const presets = [
            { label: "FHD", w: 1920, h: 1080 },
            { label: "QHD", w: 2560, h: 1440 },
            { label: "UW 34\"", w: 3440, h: 1440 },
            { label: "4K UHD", w: 3840, h: 2160 }
        ];

        function init() {
            const container = document.getElementById('presetContainer');
            presets.forEach(p => {
                const btn = document.createElement('button');
                btn.className = "preset-btn px-4 py-2 rounded-lg text-xs font-black uppercase tracking-tighter z-10";
                btn.innerText = p.label;
                btn.onclick = () => {
                    document.getElementById('widthInput').value = p.w;
                    document.getElementById('heightInput').value = p.h;
                    calculateMP();
                };
                container.appendChild(btn);
            });
            updateUI();
            calculateMP();
        }

        function calculateMP() {
            const w = parseInt(document.getElementById('widthInput').value) || 0;
            const h = parseInt(document.getElementById('heightInput').value) || 0;
            const t = translations[currentLang];

            const mp = ((w * h) / 1000000).toFixed(2);
            const diff = (((w * h) - (1920 * 1080)) / (1920 * 1080) * 100).toFixed(0);
            
            document.getElementById('mpValue').innerText = mp;
            document.getElementById('percentageDiff').innerText = (diff > 0 ? "+" + diff : diff) + "%";
            
            let v = "";
            if (mp < 1.5) v = t.verdicts.legacy;
            else if (mp < 2.5) v = t.verdicts.fhd;
            else if (mp < 4.5) v = t.verdicts.qhd;
            else if (mp < 9) v = t.verdicts.uhd;
            else v = t.verdicts.extreme;

            document.getElementById('className').innerText = mp < 3 ? "Standard Class" : mp < 6 ? "High Class" : "Enthusiast Class";
            document.getElementById('verdictText').innerText = v;
            
            document.getElementById('placeholderState').classList.add('hidden');
            const res = document.getElementById('resultPanel');
            res.classList.remove('hidden');
            setTimeout(() => {
                res.classList.remove('opacity-0', 'scale-95');
                document.getElementById('progressBar').style.transform = `scaleX(${Math.min((w*h)/8300000, 1)})`;
            }, 50);
            updatePill();
        }

        function updatePill() {
            const w = document.getElementById('widthInput').value;
            const h = document.getElementById('heightInput').value;
            const pill = document.getElementById('activePill');
            const btns = document.querySelectorAll('.preset-btn');
            let found = false;

            btns.forEach(btn => {
                const p = presets.find(x => x.label === btn.innerText);
                if(p && p.w == w && p.h == h) {
                    pill.style.width = btn.offsetWidth + 'px';
                    pill.style.height = btn.offsetHeight + 'px';
                    pill.style.left = btn.offsetLeft + 'px';
                    pill.style.top = btn.offsetTop + 'px';
                    pill.style.opacity = '1';
                    btn.classList.add('text-white');
                    found = true;
                } else {
                    btn.classList.remove('text-white');
                }
            });
            if(!found) pill.style.opacity = '0';
        }

        function switchView(view) {
            const calc = document.getElementById('view-calculator');
            const manifest = document.getElementById('view-manifest');
            
            if(view === 'calculator') {
                manifest.classList.add('hidden', 'opacity-0');
                calc.classList.remove('hidden');
                setTimeout(() => calc.classList.remove('opacity-0'), 50);
            } else {
                calc.classList.add('hidden', 'opacity-0');
                manifest.classList.remove('hidden');
                setTimeout(() => manifest.classList.remove('opacity-0'), 50);
            }
            document.getElementById('tab-calculator').classList.toggle('active', view === 'calculator');
            document.getElementById('tab-calculator').classList.toggle('inactive', view !== 'calculator');
            document.getElementById('tab-manifest').classList.toggle('active', view === 'manifest');
            document.getElementById('tab-manifest').classList.toggle('inactive', view !== 'manifest');
        }

        function toggleTheme() {
            currentTheme = currentTheme === 'dark' ? 'light' : 'dark';
            document.documentElement.classList.toggle('dark');
            document.getElementById('themeBtn').innerText = currentTheme === 'dark' ? '🌙' : '☀️';
        }

        function toggleLanguage() {
            currentLang = currentLang === 'en' ? 'pl' : 'en';
            updateUI();
            calculateMP();
        }

        function updateUI() {
            const t = translations[currentLang];
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (t[key]) el.innerText = t[key];
            });
            document.getElementById('langToggle').innerText = currentLang.toUpperCase();
            document.getElementById('manifestContent').innerHTML = currentLang === 'pl' ? `<p>Nazywam się Jakub i stworzyłem TruePixel, bo miałem dość marketingu opartego na pustych hasłach "4K". Karta graficzna nie widzi napisu na pudełku monitora - widzi miliony pikseli do przeliczenia. To narzędzie ma pokazać realną skalę wyzwania, przed jakim staje Twój sprzęt.</p>` : `<p>My name is Jakub and I created TruePixel because I was tired of marketing based on empty "4K" slogans. A graphics card doesn't see the label on your monitor box - it sees millions of pixels to calculate. This tool is meant to show the real scale of the challenge your hardware faces.</p>`;
        }

        init();
    </script>
</body>
</html>
